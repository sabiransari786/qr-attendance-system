<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Test - QR Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #319CB5;
            font-size: 1.5rem;
        }
        .test-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 4px solid #ddd;
        }
        .success {
            background: #d4edda;
            border-color: #28a745;
        }
        .error {
            background: #f8d7da;
            border-color: #dc3545;
        }
        .info {
            background: #d1ecf1;
            border-color: #17a2b8;
        }
        button {
            background: #319CB5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:active {
            opacity: 0.8;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Network & API Test</h1>
        
        <div id="results">
            <div class="test-item info">
                <strong>Testing...</strong> Please wait...
            </div>
        </div>
        
        <button onclick="runTests()">🔄 Run Tests Again</button>
    </div>

    <script>
        const resultsDiv = document.getElementById('results');

        function addResult(title, message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-item ${type}`;
            div.innerHTML = `<strong>${title}</strong><br>${message}`;
            resultsDiv.appendChild(div);
        }

        async function runTests() {
            resultsDiv.innerHTML = '';
            
            // Test 1: Current Location
            const hostname = window.location.hostname;
            const port = window.location.port;
            addResult('📍 Current Location', 
                `Hostname: ${hostname}<br>Port: ${port}<br>Full URL: ${window.location.href}`, 
                'info');

            // Test 2: API URL Detection
            let backendUrl;
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                backendUrl = 'http://localhost:5001/api';
            } else {
                backendUrl = `http://${hostname}:5001/api`;
            }
            addResult('🔗 Backend API URL', backendUrl, 'info');

            // Test 3: Health Check
            try {
                const healthUrl = `${backendUrl}/health`;
                addResult('⏳ Testing Backend...', `Calling: ${healthUrl}`, 'info');
                
                const response = await fetch(healthUrl);
                const data = await response.json();
                
                if (data.success) {
                    addResult('✅ Backend Connection', 
                        `Status: ${response.status}<br>Message: ${data.message}<br>Time: ${new Date(data.timestamp).toLocaleTimeString()}`, 
                        'success');
                } else {
                    addResult('⚠️ Backend Response', 
                        `Unexpected response: ${JSON.stringify(data)}`, 
                        'error');
                }
            } catch (error) {
                addResult('❌ Backend Connection Failed', 
                    `Error: ${error.message}<br><br>Possible causes:<br>
                    1. Backend not running<br>
                    2. Wrong network/WiFi<br>
                    3. Firewall blocking<br>
                    4. CORS issue`, 
                    'error');
            }

            // Test 4: Database Test (try to fetch anything)
            try {
                const testUrl = `${backendUrl}/auth/me`;
                const testResponse = await fetch(testUrl, {
                    headers: {
                        'Authorization': 'Bearer test-token'
                    }
                });
                const testData = await testResponse.json();
                
                addResult('✅ Database Route Accessible', 
                    `Status: ${testResponse.status}<br>Response: ${testData.message || 'OK'}`, 
                    'success');
            } catch (error) {
                addResult('❌ Database Route Failed', 
                    `Error: ${error.message}`, 
                    'error');
            }

            // Test 5: POST Request Test (Login simulation)
            try {
                const loginUrl = `${backendUrl}/auth/login`;
                addResult('⏳ Testing POST Request...', `Calling: ${loginUrl}`, 'info');
                
                const postResponse = await fetch(loginUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@test.com',
                        password: 'test123'
                    })
                });
                const postData = await postResponse.json();
                
                // Even if login fails (wrong credentials), if we get a response, POST is working
                addResult('✅ POST Request Working', 
                    `Status: ${postResponse.status}<br>Message: ${postData.message || 'OK'}<br>
                    ${postResponse.status === 401 ? 'Login failed (expected - test credentials)' : ''}`, 
                    'success');
            } catch (error) {
                addResult('❌ POST Request Failed', 
                    `Error: ${error.message}<br><br>This is likely why login is not working!<br>
                    Possible causes:<br>
                    1. CORS not allowing POST<br>
                    2. Pre-flight OPTIONS request failing<br>
                    3. Network blocking POST requests`, 
                    'error');
            }

            // Test 6: Network Info
            addResult('📡 Network Info', 
                `User Agent: ${navigator.userAgent.substring(0, 50)}...<br>
                Online: ${navigator.onLine ? 'Yes' : 'No'}<br>
                Language: ${navigator.language}`, 
                'info');
        }

        // Run tests on load
        runTests();
    </script>
</body>
</html>
